<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c26838"/>
      <stop offset="100%" style="stop-color:#a85a32"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="32" height="32" rx="7" fill="url(#bg-gradient)"/>
  <!-- Stylized Q letter representing Quietude -->
  <text 
    x="16" 
    y="23" 
    font-family="Georgia, serif" 
    font-size="22" 
    font-weight="500"
    fill="#ffffff" 
    text-anchor="middle"
    font-style="italic"
  >Q</text>
  <!-- Small decorative leaf/calm element -->
  <path 
    d="M22 22 Q24 20 23 18 Q22 19 21 19 Q20 20 22 22" 
    fill="none" 
    stroke="#ffffff" 
    stroke-width="1.2" 
    stroke-linecap="round"
    opacity="0.85"
  />
</svg>
